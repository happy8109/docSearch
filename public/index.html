<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档搜索引擎</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Home Page -->
  <div id="home-view" class="view">
    <div class="center-box">
      <div class="logo">文档搜索</div>
      <form id="search-form" class="search-box">
        <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        <input type="text" id="search-input-home" autocomplete="off" autofocus>
        <span class="clear-btn hidden" id="clear-btn-home">&times;</span>
      </form>
      <div class="buttons">
        <button id="btn-search-home">检索文档</button>
      </div>
    </div>
  </div>

  <!-- Search Results Page -->
  <div id="results-view" class="view hidden">
    <header class="top-bar">
      <div class="logo-small" id="logo-small">文档搜索</div>
      <form id="search-form-top" class="search-box-top">
        <input type="text" id="search-input-top" autocomplete="off">
        <span class="clear-btn hidden" id="clear-btn-top">&times;</span>
        <button type="submit" class="search-btn-top">
          <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        </button>
      </form>
    </header>

    <div class="search-layout">
      <div class="search-results-column">
        <div class="result-toolbar">
          <div class="result-stats" id="result-stats"></div>
          <div class="result-filters">
            <div class="time-filter" id="time-filter">
              <span class="filter-link active" data-period="all">全部</span>
              <span class="filter-link" data-period="week">近一周</span>
              <span class="filter-link" data-period="month">近一月</span>
              <span class="filter-link" data-period="year">近一年</span>
            </div>
            <div class="sort-filter" id="sort-filter">
              <span class="filter-link active" data-sort="desc">最新在前</span>
              <span class="filter-link" data-sort="asc">最早在前</span>
            </div>
          </div>
        </div>
        <div class="results-scroll-area">
          <main class="results-container" id="results-container">
            <!-- Results injected here by JS -->
          </main>

          <div class="pagination" id="pagination">
            <!-- Pagination injected here -->
          </div>
        </div>
      </div>

      <aside class="preview-panel hidden" id="preview-panel">
        <div class="preview-header">
          <h2 id="preview-title">文档预览</h2>
          <div class="preview-actions">
            <a id="preview-download-btn" class="download-btn" href="#" target="_blank">下载原文件</a>
            <span class="close-preview" id="close-preview">&times;</span>
          </div>
        </div>
        <div class="preview-body">
          <pre id="preview-text">请在左侧点击文档查看预览</pre>
        </div>
      </aside>
    </div>
  </div>

  <footer class="system-footer" id="system-footer">
    <!-- Status loaded dynamically -->
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
